<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>AI الفاتحون - ينفذ حركتك بذكاء</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0a2f1f, #051a0e);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #000000bb;
            border-radius: 60px;
            padding: 25px;
            backdrop-filter: blur(5px);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #ffd966;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #b87c3a;
            padding: 20px;
            border-radius: 32px;
            margin-bottom: 20px;
        }
        .cell {
            background: #f7e8c8;
            border-radius: 18px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            font-family: monospace;
            color: #3b2a1f;
            box-shadow: inset 0 0 0 2px #fff3cf, 0 4px 8px rgba(0,0,0,0.2);
        }
        .cell.empty {
            background: #ecdbb8;
            color: #b5976b;
        }
        .direction-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .dir-btn {
            background: #2c5a2e;
            box-shadow: 0 4px 0 #1a3a1a;
            font-size: 24px;
            padding: 12px 20px;
            color: white;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        button {
            background: #f5b642;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 4px 0 #9b5e2c;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(2px);
        }
        .ai-status {
            background: #1e2a1acc;
            border-radius: 50px;
            padding: 15px;
            text-align: center;
            color: #ffecb3;
            font-size: 1rem;
            margin-top: 15px;
        }
        .suggestion {
            font-size: 1.3rem;
            font-weight: bold;
            background: #000000aa;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            margin-top: 8px;
        }
        @media (max-width: 480px) {
            .cell { font-size: 20px; }
            .dir-btn { font-size: 18px; padding: 8px 12px; }
            button { padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 AI الفاتحون - المستشار الذكي</h1>
    <div class="grid" id="gameGrid"></div>
    
    <div class="direction-buttons">
        <button class="dir-btn" id="moveUp">⬆️ أعلى</button>
        <button class="dir-btn" id="moveDown">⬇️ أسفل</button>
        <button class="dir-btn" id="moveLeft">⬅️ يسار</button>
        <button class="dir-btn" id="moveRight">➡️ يمين</button>
    </div>
    
    <div class="controls">
        <button id="aiSuggestBtn">🤖 اطلب نصيحة AI</button>
        <button id="resetBtn">🔄 مسح كل الخانات</button>
    </div>
    
    <div class="ai-status" id="aiStatus">
        📌 اضغط على أي سهم لتنفيذ الحركة مباشرة
    </div>
</div>

<script>
    const SIZE = 4;
    let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
    
    function renderGrid() {
        const container = document.getElementById("gameGrid");
        container.innerHTML = "";
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = grid[i][j];
                const cell = document.createElement("div");
                cell.className = "cell" + (val === 0 ? " empty" : "");
                cell.innerText = val === 0 ? "" : val;
                container.appendChild(cell);
            }
        }
    }
    
    // تنفيذ حركة السحب (زي 2048)
    function executeMove(direction) {
        let newGrid = grid.map(row => [...row]);
        let changed = false;
        
        if (direction === 'left') {
            for (let i = 0; i < SIZE; i++) {
                let row = newGrid[i].filter(v => v !== 0);
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j+1]) {
                        row[j] = row[j] + 1;
                        row.splice(j+1, 1);
                        changed = true;
                    }
                }
                while (row.length < SIZE) row.push(0);
                if (JSON.stringify(newGrid[i]) !== JSON.stringify(row)) changed = true;
                newGrid[i] = row;
            }
        }
        else if (direction === 'right') {
            for (let i = 0; i < SIZE; i++) {
                let row = newGrid[i].filter(v => v !== 0);
                for (let j = row.length - 1; j > 0; j--) {
                    if (row[j] === row[j-1]) {
                        row[j] = row[j] + 1;
                        row.splice(j-1, 1);
                        j--;
                        changed = true;
                    }
                }
                while (row.length < SIZE) row.unshift(0);
                if (JSON.stringify(newGrid[i]) !== JSON.stringify(row)) changed = true;
                newGrid[i] = row;
            }
        }
        else if (direction === 'up') {
            for (let j = 0; j < SIZE; j++) {
                let col = [];
                for (let i = 0; i < SIZE; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
                for (let k = 0; k < col.length - 1; k++) {
                    if (col[k] === col[k+1]) {
                        col[k] = col[k] + 1;
                        col.splice(k+1, 1);
                        changed = true;
                    }
                }
                while (col.length < SIZE) col.push(0);
                for (let i = 0; i < SIZE; i++) {
                    if (newGrid[i][j] !== col[i]) changed = true;
                    newGrid[i][j] = col[i];
                }
            }
        }
        else if (direction === 'down') {
            for (let j = 0; j < SIZE; j++) {
                let col = [];
                for (let i = 0; i < SIZE; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
                for (let k = col.length - 1; k > 0; k--) {
                    if (col[k] === col[k-1]) {
                        col[k] = col[k] + 1;
                        col.splice(k-1, 1);
                        k--;
                        changed = true;
                    }
                }
                while (col.length < SIZE) col.unshift(0);
                for (let i = 0; i < SIZE; i++) {
                    if (newGrid[i][j] !== col[i]) changed = true;
                    newGrid[i][j] = col[i];
                }
            }
        }
        
        if (changed) {
            grid = newGrid;
            renderGrid();
            return true;
        }
        return false;
    }
    
    // تقييم جودة الشبكة
    function evaluateGrid(grid) {
        let maxVal = 0;
        let emptyCount = 0;
        let score = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                let v = grid[i][j];
                if (v > maxVal) maxVal = v;
                if (v === 0) emptyCount++;
                score += v * v;
                if ((i === 0 || i === SIZE-1) && (j === 0 || j === SIZE-1) && v >= 5) {
                    score += v * 50;
                }
            }
        }
        if (maxVal >= 11) score += 1000000;
        else if (maxVal >= 10) score += 50000;
        score += emptyCount * 300;
        return score;
    }
    
    // إيجاد أفضل حركة
    function getBestMove() {
        const directions = ['up', 'down', 'left', 'right'];
        const dirNames = {'up': '⬆️ أعلى', 'down': '⬇️ أسفل', 'left': '⬅️ يسار', 'right': '➡️ يمين'};
        let bestDir = null;
        let bestScore = -Infinity;
        
        for (let dir of directions) {
            let testGrid = grid.map(row => [...row]);
            let newGrid = simulateMoveOnCopy(testGrid, dir);
            if (newGrid) {
                let score = evaluateGrid(newGrid);
                if (score > bestScore) {
                    bestScore = score;
                    bestDir = dir;
                }
            }
        }
        return bestDir ? dirNames[bestDir] : null;
    }
    
    function simulateMoveOnCopy(gridCopy, direction) {
        let newGrid = gridCopy.map(row => [...row]);
        let changed = false;
        
        if (direction === 'left') {
            for (let i = 0; i < SIZE; i++) {
                let row = newGrid[i].filter(v => v !== 0);
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j+1]) {
                        row[j] = row[j] + 1;
                        row.splice(j+1, 1);
                        changed = true;
                    }
                }
                while (row.length < SIZE) row.push(0);
                if (JSON.stringify(newGrid[i]) !== JSON.stringify(row)) changed = true;
                newGrid[i] = row;
            }
        }
        else if (direction === 'right') {
            for (let i = 0; i < SIZE; i++) {
                let row = newGrid[i].filter(v => v !== 0);
                for (let j = row.length - 1; j > 0; j--) {
                    if (row[j] === row[j-1]) {
                        row[j] = row[j] + 1;
                        row.splice(j-1, 1);
                        j--;
                        changed = true;
                    }
                }
                while (row.length < SIZE) row.unshift(0);
                if (JSON.stringify(newGrid[i]) !== JSON.stringify(row)) changed = true;
                newGrid[i] = row;
            }
        }
        else if (direction === 'up') {
            for (let j = 0; j < SIZE; j++) {
                let col = [];
                for (let i = 0; i < SIZE; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
                for (let k = 0; k < col.length - 1; k++) {
                    if (col[k] === col[k+1]) {
                        col[k] = col[k] + 1;
                        col.splice(k+1, 1);
                        changed = true;
                    }
                }
                while (col.length < SIZE) col.push(0);
                for (let i = 0; i < SIZE; i++) {
                    if (newGrid[i][j] !== col[i]) changed = true;
                    newGrid[i][j] = col[i];
                }
            }
        }
        else if (direction === 'down') {
            for (let j = 0; j < SIZE; j++) {
                let col = [];
                for (let i = 0; i < SIZE; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
                for (let k = col.length - 1; k > 0; k--) {
                    if (col[k] === col[k-1]) {
                        col[k] = col[k] + 1;
                        col.splice(k-1, 1);
                        k--;
                        changed = true;
                    }
                }
                while (col.length < SIZE) col.unshift(0);
                for (let i = 0; i < SIZE; i++) {
                    if (newGrid[i][j] !== col[i]) changed = true;
                    newGrid[i][j] = col[i];
                }
            }
        }
        return changed ? newGrid : null;
    }
    
    function aiSuggest() {
        let best = getBestMove();
        if (best) {
            document.getElementById("aiStatus").innerHTML = `🧠 AI ينصح بـ: <span class="suggestion">${best}</span><br>✏️ اضغط على السهم المنفذ`;
        } else {
            document.getElementById("aiStatus").innerHTML = "⚠️ لا توجد حركة صالحة حالياً، اضغط مسح الخانات واكتب أرقاماً جديدة";
        }
    }
    
    function resetGrid() {
        grid = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        renderGrid();
        document.getElementById("aiStatus").innerHTML = "🗑️ تم مسح الخانات. أدخل أرقامك الجديدة يدوياً بالضغط على الخانات";
    }
    
    function makeMoveAndUpdate(direction, dirName) {
        let changed = executeMove(direction);
        if (!changed) {
            document.getElementById("aiStatus").innerHTML = `⚠️ حركة ${dirName} غير مجدية حالياً، الرجاء إضافة الرقم العشوائي الجديد أولاً`;
        } else {
            document.getElementById("aiStatus").innerHTML = `✅ تم تنفيذ ${dirName}. الآن: أضف الرقم العشوائي الجديد (1-5) في أي خانة فارغة بالضغط عليها`;
        }
    }
    
    // جعل الخلايا قابلة للتعديل يدوياً
    function makeCellsEditable() {
        const container = document.getElementById("gameGrid");
        container.innerHTML = "";
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = grid[i][j];
                const cell = document.createElement("div");
                cell.className = "cell" + (val === 0 ? " empty" : "");
                cell.innerText = val === 0 ? "" : val;
                cell.style.cursor = "pointer";
                cell.addEventListener("click", ((x, y) => () => {
                    let newVal = prompt(`أدخل الرقم الجديد للخلية (${x+1},${y+1}):`, grid[x][y] === 0 ? "" : grid[x][y]);
                    if (newVal !== null) {
                        let num = parseInt(newVal);
                        if (isNaN(num)) num = 0;
                        grid[x][y] = num;
                        renderGrid();
                        makeCellsEditable();
                    }
                })(i, j));
                container.appendChild(cell);
            }
        }
    }
    
    function renderGrid() {
        makeCellsEditable();
    }
    
    document.getElementById("moveUp").addEventListener("click", () => makeMoveAndUpdate('up', 'أعلى'));
    document.getElementById("moveDown").addEventListener("click", () => makeMoveAndUpdate('down', 'أسفل'));
    document.getElementById("moveLeft").addEventListener("click", () => makeMoveAndUpdate('left', 'يسار'));
    document.getElementById("moveRight").addEventListener("click", () => makeMoveAndUpdate('right', 'يمين'));
    document.getElementById("aiSuggestBtn").addEventListener("click", aiSuggest);
    document.getElementById("resetBtn").addEventListener("click", resetGrid);
    
    resetGrid();
</script>
</body>
</html>
