<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>AI الفاتحون - تحليل حركات الدمج</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a2f1f, #051a0e);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #000000aa;
            border-radius: 48px;
            padding: 25px;
            backdrop-filter: blur(4px);
            max-width: 550px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #ffd966;
            margin-top: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #b87c3a;
            padding: 20px;
            border-radius: 28px;
            margin-bottom: 20px;
        }
        .cell input {
            width: 100%;
            aspect-ratio: 1 / 1;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            background: #f7e8c8;
            border: none;
            border-radius: 16px;
            color: #3b2a1f;
            outline: none;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        button {
            background: #f5b642;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 4px 0 #9b5e2c;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(2px);
        }
        .result {
            background: #1e2a1ac9;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            color: #ffecb3;
            margin-top: 15px;
        }
        .direction {
            font-size: 3rem;
            font-weight: bold;
            background: #000000aa;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 60px;
            margin: 10px 0;
        }
        .warning {
            color: #ffaa88;
            font-size: 0.9rem;
        }
        @media (max-width: 480px) {
            .cell input { font-size: 18px; }
            button { padding: 8px 16px; font-size: 14px; }
            .direction { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🧠 مستشار AI - لعبة الفاتحون</h2>
    <div class="grid" id="gridContainer"></div>
    
    <div class="controls">
        <button id="analyzeBtn">🔍 تحليل أفضل حركة</button>
        <button id="resetBtn">🗑️ مسح كل الخانات</button>
    </div>
    
    <div class="result" id="resultPanel">
        ✏️ أدخل الأرقام كما تظهر في لعبتك، ثم اضغط "تحليل"
    </div>
</div>

<script>
    const SIZE = 4;
    let gridData = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
    
    // عرض شبكة الإدخال
    function renderInputGrid() {
        const container = document.getElementById("gridContainer");
        container.innerHTML = "";
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                const input = document.createElement("input");
                input.type = "number";
                input.value = gridData[i][j] === 0 ? "" : gridData[i][j];
                input.placeholder = "0";
                input.min = 0;
                input.max = 20;
                input.addEventListener("change", ((x, y) => (e) => {
                    let val = parseInt(e.target.value);
                    if (isNaN(val)) val = 0;
                    gridData[x][y] = val;
                })(i, j));
                cell.appendChild(input);
                container.appendChild(cell);
            }
        }
    }
    
    // محاكاة الحركة في اتجاه معين (زي لعبة 2048)
    function simulateMove(grid, direction) {
        let newGrid = grid.map(row => [...row]);
        let changed = false;
        
        if (direction === 'left') {
            for (let i = 0; i < SIZE; i++) {
                let row = newGrid[i].filter(v => v !== 0);
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j+1]) {
                        row[j] = row[j] + 1;
                        row.splice(j+1, 1);
                        changed = true;
                    }
                }
                while (row.length < SIZE) row.push(0);
                if (JSON.stringify(newGrid[i]) !== JSON.stringify(row)) changed = true;
                newGrid[i] = row;
            }
        }
        else if (direction === 'right') {
            for (let i = 0; i < SIZE; i++) {
                let row = newGrid[i].filter(v => v !== 0);
                for (let j = row.length - 1; j > 0; j--) {
                    if (row[j] === row[j-1]) {
                        row[j] = row[j] + 1;
                        row.splice(j-1, 1);
                        j--;
                        changed = true;
                    }
                }
                while (row.length < SIZE) row.unshift(0);
                if (JSON.stringify(newGrid[i]) !== JSON.stringify(row)) changed = true;
                newGrid[i] = row;
            }
        }
        else if (direction === 'up') {
            for (let j = 0; j < SIZE; j++) {
                let col = [];
                for (let i = 0; i < SIZE; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
                for (let k = 0; k < col.length - 1; k++) {
                    if (col[k] === col[k+1]) {
                        col[k] = col[k] + 1;
                        col.splice(k+1, 1);
                        changed = true;
                    }
                }
                while (col.length < SIZE) col.push(0);
                for (let i = 0; i < SIZE; i++) {
                    if (newGrid[i][j] !== col[i]) changed = true;
                    newGrid[i][j] = col[i];
                }
            }
        }
        else if (direction === 'down') {
            for (let j = 0; j < SIZE; j++) {
                let col = [];
                for (let i = 0; i < SIZE; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
                for (let k = col.length - 1; k > 0; k--) {
                    if (col[k] === col[k-1]) {
                        col[k] = col[k] + 1;
                        col.splice(k-1, 1);
                        k--;
                        changed = true;
                    }
                }
                while (col.length < SIZE) col.unshift(0);
                for (let i = 0; i < SIZE; i++) {
                    if (newGrid[i][j] !== col[i]) changed = true;
                    newGrid[i][j] = col[i];
                }
            }
        }
        return { newGrid, changed };
    }
    
    // تقييم جودة الشبكة (كلما زاد الرقم وزادت الفراغات كلما كان أفضل)
    function evaluateGrid(grid) {
        let maxVal = 0;
        let emptyCount = 0;
        let score = 0;
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                let v = grid[i][j];
                if (v > maxVal) maxVal = v;
                if (v === 0) emptyCount++;
                score += v * v;
                // مكافأة الأرقام الكبيرة في الزوايا
                if ((i === 0 || i === SIZE-1) && (j === 0 || j === SIZE-1) && v >= 5) {
                    score += v * 50;
                }
            }
        }
        if (maxVal >= 11) score += 1000000;
        else if (maxVal >= 10) score += 50000;
        else if (maxVal >= 9) score += 5000;
        score += emptyCount * 200;
        return score;
    }
    
    // إيجاد أفضل حركة
    function getBestMove() {
        const directions = ['up', 'down', 'left', 'right'];
        const dirNames = {
            'up': '⬆️ أعلى',
            'down': '⬇️ أسفل',
            'left': '⬅️ يسار',
            'right': '➡️ يمين'
        };
        
        let bestDir = null;
        let bestScore = -Infinity;
        
        for (let dir of directions) {
            let { newGrid, changed } = simulateMove(gridData, dir);
            if (!changed) continue;
            let score = evaluateGrid(newGrid);
            if (score > bestScore) {
                bestScore = score;
                bestDir = dir;
            }
        }
        
        return bestDir ? dirNames[bestDir] : null;
    }
    
    function analyze() {
        // التأكد من وجود أرقام للدمج
        let hasValidMove = false;
        const dirs = ['up', 'down', 'left', 'right'];
        for (let dir of dirs) {
            let { changed } = simulateMove(gridData, dir);
            if (changed) {
                hasValidMove = true;
                break;
            }
        }
        
        if (!hasValidMove) {
            document.getElementById("resultPanel").innerHTML = `
                ⚠️ لا توجد حركة دمج صالحة!<br>
                <span class="warning">تأكد من وجود رقمين متساويين في صف أو عمود واحد</span>
            `;
            return;
        }
        
        let bestMove = getBestMove();
        if (bestMove) {
            document.getElementById("resultPanel").innerHTML = `
                🧠 أفضل حركة هي:<br>
                <div class="direction">${bestMove}</div>
                <div class="warning">👉 بعد تنفيذ الحركة في لعبتك، ادخل الأرقام الجديدة ثم حلل مرة أخرى</div>
            `;
        } else {
            document.getElementById("resultPanel").innerHTML = `
                ⚠️ لا توجد حركة متاحة حالياً<br>
                <span class="warning">جرب إعادة تعيين أو تحقق من الأرقام</span>
            `;
        }
    }
    
    function resetGrid() {
        gridData = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        renderInputGrid();
        document.getElementById("resultPanel").innerHTML = "🗑️ تم مسح الخانات. أدخل أرقامك الجديدة.";
    }
    
    document.getElementById("analyzeBtn").addEventListener("click", analyze);
    document.getElementById("resetBtn").addEventListener("click", resetGrid);
    
    renderInputGrid();
</script>
</body>
</html>
