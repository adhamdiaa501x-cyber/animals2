<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>AI الفاتحون - إدخال يدوي وتحليل عميق</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0a2f1f, #051a0e);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .main-container {
            background: #000000aa;
            border-radius: 48px;
            padding: 25px;
            backdrop-filter: blur(4px);
            box-shadow: 0 20px 30px black;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 85px);
            gap: 12px;
            background: #b87c3a;
            padding: 20px;
            border-radius: 28px;
            margin-bottom: 20px;
        }
        .cell {
            background: #f7e8c8;
            height: 85px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell input {
            width: 70px;
            height: 70px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            background: transparent;
            border: none;
            border-radius: 16px;
            color: #3b2a1f;
            outline: none;
        }
        .cell.empty-input {
            background: #dbbb8c;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        button {
            background: #f5b642;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 4px 0 #9b5e2c;
        }
        button:active {
            transform: translateY(2px);
        }
        .ai-panel {
            background: #1e2a1ac9;
            border-radius: 50px;
            padding: 15px 20px;
            margin-top: 15px;
            text-align: center;
            color: #ffecb3;
            font-size: 1.2rem;
        }
        .arrow-box {
            font-size: 3rem;
            background: #000000aa;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 60px;
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 10px;
        }
        .move-detail {
            font-size: 1.1rem;
            margin-top: 8px;
            color: #ffd966;
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(4, 70px); gap: 8px; }
            .cell input { width: 55px; height: 55px; font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="grid" id="dynamicGrid"></div>
    <div class="controls">
        <button id="analyzeBtn">🤖 AI يحلل ويتخذ قرار</button>
        <button id="resetBtn">🔄 إعادة تعيين (تفريغ الخانات)</button>
    </div>
    <div class="ai-panel" id="aiMessage">
        ✏️ اكتب الأرقام كما تظهر في لعبتك ثم اضغط "AI يحلل"
    </div>
</div>

<script>
    const SIZE = 4;
    let gridData = Array(SIZE).fill().map(() => Array(SIZE).fill(0));

    function cloneGrid(grid) {
        return grid.map(row => [...row]);
    }

    function getAllMoves(grid) {
        let moves = [];
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (grid[i][j] === 0) continue;
                if (j + 1 < SIZE && grid[i][j+1] === grid[i][j])
                    moves.push({ from: [i, j], to: [i, j+1], val: grid[i][j], dir: "➡️" });
                if (i + 1 < SIZE && grid[i+1][j] === grid[i][j])
                    moves.push({ from: [i, j], to: [i+1, j], val: grid[i][j], dir: "⬇️" });
            }
        }
        const unique = [];
        const set = new Set();
        for (let m of moves) {
            const key = `${m.from[0]},${m.from[1]}-${m.to[0]},${m.to[1]}`;
            if (!set.has(key)) {
                set.add(key);
                unique.push(m);
            }
        }
        return unique;
    }

    function tryMergeOnCopy(grid, fromX, fromY, toX, toY) {
        let g = cloneGrid(grid);
        if (g[fromX][fromY] === 0 || g[toX][toY] === 0) return null;
        if (g[fromX][fromY] !== g[toX][toY]) return null;
        if (Math.abs(fromX - toX) + Math.abs(fromY - toY) !== 1) return null;
        const newVal = g[fromX][fromY] + 1;
        g[fromX][fromY] = newVal;
        g[toX][toY] = 0;
        return g;
    }

    // MCTS
    class MCTSNode {
        constructor(grid, parent = null, move = null) {
            this.grid = cloneGrid(grid);
            this.parent = parent;
            this.move = move;
            this.children = [];
            this.wins = 0;
            this.visits = 0;
            this.untriedMoves = getAllMoves(this.grid);
        }

        isFullyExpanded() { return this.untriedMoves.length === 0; }

        selectChild() {
            let best = null;
            let bestUCB = -Infinity;
            for (let child of this.children) {
                let ucb = (child.wins / child.visits) + 1.4 * Math.sqrt(Math.log(this.visits) / child.visits);
                if (ucb > bestUCB) {
                    bestUCB = ucb;
                    best = child;
                }
            }
            return best;
        }

        expand() {
            if (this.untriedMoves.length === 0) return null;
            let move = this.untriedMoves.pop();
            let newGrid = tryMergeOnCopy(this.grid, move.from[0], move.from[1], move.to[0], move.to[1]);
            if (!newGrid) return null;
            let emptyCells = [];
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE; j++)
                    if (newGrid[i][j] === 0) emptyCells.push([i, j]);
            if (emptyCells.length > 0) {
                let randPos = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                let randVal = Math.floor(Math.random() * 5) + 1;
                newGrid[randPos[0]][randPos[1]] = randVal;
            }
            let child = new MCTSNode(newGrid, this, move);
            this.children.push(child);
            return child;
        }

        simulate() {
            let simGrid = cloneGrid(this.grid);
            let steps = 0;
            while (steps < 70) {
                let moves = getAllMoves(simGrid);
                if (moves.length === 0) break;
                let randMove = moves[Math.floor(Math.random() * moves.length)];
                let simCopy = tryMergeOnCopy(simGrid, randMove.from[0], randMove.from[1], randMove.to[0], randMove.to[1]);
                if (!simCopy) break;
                simGrid = simCopy;
                let empty = [];
                for (let i = 0; i < SIZE; i++)
                    for (let j = 0; j < SIZE; j++)
                        if (simGrid[i][j] === 0) empty.push([i, j]);
                if (empty.length > 0) {
                    let pos = empty[Math.floor(Math.random() * empty.length)];
                    simGrid[pos[0]][pos[1]] = Math.floor(Math.random() * 5) + 1;
                }
                steps++;
                let maxV = 0;
                for (let i = 0; i < SIZE; i++)
                    for (let j = 0; j < SIZE; j++)
                        if (simGrid[i][j] > maxV) maxV = simGrid[i][j];
                if (maxV >= 11) return 1;
            }
            let finalScore = 0;
            let maxVal = 0;
            let emptyCount = 0;
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE; j++) {
                    let v = simGrid[i][j];
                    if (v > maxVal) maxVal = v;
                    if (v === 0) emptyCount++;
                    finalScore += v * v;
                }
            finalScore += emptyCount * 200;
            if (maxVal >= 10) finalScore += 5000;
            if (maxVal >= 11) finalScore += 1000000;
            return finalScore / 10000;
        }

        backpropagate(result) {
            this.visits++;
            this.wins += result;
            if (this.parent) this.parent.backpropagate(result);
        }

        bestMoveInfo() {
            let best = null;
            let bestScore = -Infinity;
            for (let child of this.children) {
                let score = child.wins / child.visits;
                if (score > bestScore) {
                    bestScore = score;
                    best = child;
                }
            }
            return best ? best.move : null;
        }
    }

    function getBestMoveWithMCTS(grid, iterations = 1400) {
        let root = new MCTSNode(grid);
        for (let i = 0; i < iterations; i++) {
            let node = root;
            while (node.isFullyExpanded() && node.children.length > 0) {
                node = node.selectChild();
            }
            if (!node.isFullyExpanded()) {
                let newNode = node.expand();
                if (newNode) node = newNode;
            }
            let result = node.simulate();
            node.backpropagate(result);
        }
        return root.bestMoveInfo();
    }

    function renderEditableGrid() {
        const container = document.getElementById("dynamicGrid");
        container.innerHTML = "";
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const val = gridData[i][j];
                const cellDiv = document.createElement("div");
                cellDiv.className = "cell" + (val === 0 ? " empty-input" : "");
                const input = document.createElement("input");
                input.type = "number";
                input.value = val === 0 ? "" : val;
                input.placeholder = "";
                input.min = 0;
                input.max = 20;
                input.addEventListener("change", (function(x, y) {
                    return function(e) {
                        let newVal = parseInt(e.target.value);
                        if (isNaN(newVal)) newVal = 0;
                        if (newVal < 0) newVal = 0;
                        gridData[x][y] = newVal;
                        renderEditableGrid();
                    };
                })(i, j));
                cellDiv.appendChild(input);
                container.appendChild(cellDiv);
            }
        }
    }

    function resetGrid() {
        gridData = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        renderEditableGrid();
        document.getElementById("aiMessage").innerHTML = "🔄 تم مسح الخانات. أدخل أرقامك الآن.";
    }

    function analyzeAndRecommend() {
        const current = cloneGrid(gridData);
        const moves = getAllMoves(current);
        if (moves.length === 0) {
            document.getElementById("aiMessage").innerHTML = "⚠️ لا توجد حركة دمج صالحة! غير الأرقام أو أعد التعيين.";
            return;
        }
        document.getElementById("aiMessage").innerHTML = "⏳ الذكاء يحلل الاحتمالات العميقة (MCTS) ...";
        setTimeout(() => {
            const bestMove = getBestMoveWithMCTS(current, 1400);
            if (!bestMove) {
                document.getElementById("aiMessage").innerHTML = "❌ فشل التحليل، حاول مرة أخرى.";
                return;
            }
            const fromCell = bestMove.from;
            const toCell = bestMove.to;
            let arrow = "";
            if (fromCell[0] === toCell[0]) {
                arrow = fromCell[1] < toCell[1] ? "➡️ يمين" : "⬅️ يسار";
            } else {
                arrow = fromCell[0] < toCell[0] ? "⬇️ أسفل" : "⬆️ أعلى";
            }
            const val = bestMove.val;
            const msg = `🧠 أقترح: ادمج ${val} + ${val}<br> من (صف ${fromCell[0]+1}، عمود ${fromCell[1]+1}) إلى (صف ${toCell[0]+1}، عمود ${toCell[1]+1})`;
            document.getElementById("aiMessage").innerHTML = msg + `<div class="arrow-box">${arrow}</div><div class="move-detail">النتيجة بعد الدمج → ${val+1}</div>`;
        }, 30);
    }

    document.getElementById("analyzeBtn").addEventListener("click", analyzeAndRecommend);
    document.getElementById("resetBtn").addEventListener("click", resetGrid);
    
    resetGrid();
</script>
</body>
</html>
